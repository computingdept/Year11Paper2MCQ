<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>J277 Paper 2 MCQ Practice - All Years</title>
  <style>
    :root{
      --green:#2f6f4e;
      --green-dark:#24583e;
      --bg:#f4f7f5;
      --card:#ffffff;
      --line:#dbe5de;
      --text:#102015;
      --muted:#5b6b61;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
    .shell{height:100vh;display:grid;grid-template-rows:auto 1fr}
    .topbar{background:var(--card);border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(0,0,0,.06);padding:10px 16px 12px;z-index:5}
    .title-row{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:8px}
    .title{font-size:1.05rem;font-weight:800;color:var(--green-dark);white-space:nowrap}
    .hint{font-size:.85rem;color:var(--muted);white-space:nowrap}
    .year-tabs{display:flex;gap:8px;align-items:center;overflow-x:auto;padding-bottom:2px}
    .year-tab{border:1px solid var(--line);background:#fff;color:var(--green-dark);font-weight:800;border-radius:999px;padding:9px 18px;cursor:pointer;min-width:110px;transition:.15s ease}
    .year-tab:hover{border-color:var(--green);transform:translateY(-1px)}
    .year-tab.active{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 4px 12px rgba(47,111,78,.22)}
    .open-link{border:0;background:transparent;color:var(--green-dark);font-weight:700;text-decoration:underline;cursor:pointer;font-size:.86rem;white-space:nowrap}
    .frame-wrap{height:100%;background:#eef4f0}
    iframe{width:100%;height:100%;border:0;background:white;display:block}
    @media(max-width:720px){
      .title-row{align-items:flex-start;flex-direction:column;gap:4px}
      .title,.hint{white-space:normal}
      .year-tab{min-width:92px;padding:9px 12px}
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="title-row">
        <div class="title">OCR J277 Paper 2 MCQ Practice</div>
        <button class="open-link" id="openCurrent" type="button">Open selected year in new tab</button>
      </div>
      <nav class="year-tabs" aria-label="Exam paper year">
        <button class="year-tab" data-year="2025" type="button">June2025</button>
        <button class="year-tab" data-year="2024" type="button">June2024</button>
        <button class="year-tab" data-year="2023" type="button">June2023</button>
        <button class="year-tab" data-year="2022" type="button">June2022</button>
      </nav>
    </header>
    <section class="frame-wrap">
      <iframe id="paperFrame" title="Selected MCQ practice paper" src="2025/index.html"></iframe>
    </section>
  </main>
  <script>
    const tabs = [...document.querySelectorAll('.year-tab')];
    const frame = document.getElementById('paperFrame');
    const openCurrent = document.getElementById('openCurrent');
    let currentYear = '2025';

    function selectYear(year, push = true){
      currentYear = year;
      tabs.forEach(btn => btn.classList.toggle('active', btn.dataset.year === year));
      frame.src = `${year}/index.html`;
      if(push){
        const url = new URL(window.location.href);
        url.searchParams.set('year', year);
        window.history.replaceState({}, '', url);
      }
    }

    tabs.forEach(btn => btn.addEventListener('click', () => selectYear(btn.dataset.year)));
    openCurrent.addEventListener('click', () => window.open(`${currentYear}/index.html`, '_blank'));

    const params = new URLSearchParams(window.location.search);
    const requested = params.get('year');
    selectYear(['2022','2023','2024','2025'].includes(requested) ? requested : '2025', false);
  </script>
</body>
</html>
